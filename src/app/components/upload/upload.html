<section class="flex flex-col items-center gap-8 py-6 sm:py-10">
  <header class="text-center max-w-xl">
    <p class="text-xs tracking-[0.3em] uppercase text-gold mb-3">Step 1 of 4</p>
    <h1 class="font-display text-4xl sm:text-5xl tracking-wider leading-none">
      Upload your photo
    </h1>
    <p class="mt-3 text-sm opacity-70">
      A face, a posture, a vibe. The mountain sees everything.
    </p>
  </header>

  @if (previewUrl()) {
    <div class="w-full max-w-md flex flex-col items-center gap-5">
      <div
        class="w-full aspect-square rounded-2xl overflow-hidden border border-white/15 bg-ink-soft"
      >
        <img
          [src]="previewUrl()!"
          alt="Your uploaded photo"
          class="w-full h-full object-cover"
        />
      </div>
      <div class="flex gap-3 w-full">
        <button
          type="button"
          (click)="clearFile()"
          class="flex-1 py-3 rounded-lg border border-white/20 hover:border-white/40 transition-colors text-sm tracking-widest uppercase"
        >
          Change photo
        </button>
        <button
          type="button"
          (click)="continue()"
          class="flex-1 py-3 rounded-lg bg-blood hover:bg-blood/90 transition-colors text-sm font-bold tracking-widest uppercase"
        >
          Continue →
        </button>
      </div>
    </div>
  } @else {
    <label
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.border-gold]="isDragging()"
      [class.bg-ink-soft]="isDragging()"
      class="w-full max-w-md aspect-square rounded-2xl border-2 border-dashed border-white/20 flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-white/40 transition-colors p-8 text-center"
    >
      <svg
        class="w-12 h-12 opacity-60"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M3 16.5V18a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-1.5M7.5 10.5 12 6m0 0 4.5 4.5M12 6v12"
        />
      </svg>
      <p class="font-display text-2xl tracking-wider">Drop your photo here</p>
      <p class="text-xs uppercase tracking-widest opacity-50">
        or click to browse
      </p>
      <p class="text-[10px] uppercase tracking-widest opacity-40 mt-2">
        JPEG · PNG · Max 10 MB
      </p>
      <input
        type="file"
        accept="image/*"
        class="sr-only"
        (change)="onFileSelected($event)"
      />
    </label>

    @if (error()) {
      <p class="text-sm text-blood">{{ error() }}</p>
    }
  }
</section>
